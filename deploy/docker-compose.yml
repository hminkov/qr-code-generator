version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
    restart: unless-stopped
    env_file: ../.env
    ports:
      - "8000:8000"
    volumes:
      - ../src:/app/src:ro
      - ../api:/app/api:ro
      - api_data:/app/data

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/out:/var/www/frontend/out:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  api_data:
